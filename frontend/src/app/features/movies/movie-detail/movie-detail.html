<app-navbar></app-navbar>

<div class="detail" *ngIf="movie">
  <img [src]="movie.image" />

  <div class="info">
    <h1>{{ movie.title }}</h1>
    <p>{{ movie.genre }}</p>
    <p>⭐ {{ movie.rating }}</p>
    <p>{{ movie.description }}</p>

    <div class="review-box">
      <h3>Leave a review</h3>

      <div class="stars">
        @for (star of [1,2,3,4,5]; track star) {
          <span
            (click)="setRating(star)"
            [class.active]="star <= rating"
          >
            ★
          </span>
        }
      </div>

      <textarea
        [(ngModel)]="comment"
        placeholder="Write your comment..."
      ></textarea>

      <button (click)="addComment()">Submit</button>
    </div>

    <div class="comments">
      <h3>Comments</h3>

      @for (c of comments; track c) {
        <div class="comment">
          <span class="rating">⭐ {{ c.rating }}</span>
          <p>{{ c.text }}</p>
        </div>
      }
    </div>
  </div>
</div>
