<div class="movie-card" (click)="openMovie()">
  <div class="poster-wrap">
    <img [src]="movie.image" />
  </div>

  <div class="movie-info">
    <h3>{{ movie.title }}</h3>

    <div class="meta-row">
      <span class="genre-badge">{{ movie.genre }}</span>

      <div class="stats">
        <span class="rating">★ {{ (movie.rating / 2).toFixed(1) }}</span>
      </div>
    </div>
  </div>
</div>
